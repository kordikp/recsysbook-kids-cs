<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#13101f">
  <title>Tiny Glitch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Nunito:wght@400;700;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=51">
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" class="screen">
    <div class="splash-inner">
      <img src="assets/TinyGlitch.png" alt="Tiny Glitch" class="splash-logo-img">
<p class="splash-sub">Vzdělávací sociální síť</p>
      <button id="splash-enter" class="btn-primary">Vstoupit</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="screen hidden">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-logo" id="logo-btn" style="cursor:pointer"><img src="assets/TinyGlitch-wide.png" alt="Tiny Glitch"></div>
        <div class="topbar-right">
          <button class="topbar-profile" id="profile-btn" aria-label="Profil">
            <img src="assets/avatar.png" class="avatar-img" alt="">
            <img id="bell-icon" class="bell-icon hidden" src="assets/dingdong.svg" width="18" height="18" alt="Přihlásit se">
          </button>
        </div>
      </div>
    </header>

    <!-- Views -->
    <main class="main-content">

      <!-- FEED -->
      <section id="view-feed" class="view active">
        <div id="feed-container"></div>
      </section>

      <!-- MAP -->
      <section id="view-map" class="view hidden">
        <div class="map-search-wrap">
          <input type="search" id="map-search" placeholder="🔍  Hledat glitch..." autocomplete="off">
        </div>
        <div id="map-container"></div>
      </section>

      <!-- MISSIONS -->
      <section id="view-missions" class="view hidden">
        <div id="category-carousel"></div>
        <div class="missions-body">
          <div id="missions-container"></div>
        </div>
      </section>

    </main>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <div class="nav-spotlight"></div>
        <button class="nav-btn" data-view="map">
          <span class="nav-label">Hledej</span>
        </button>
        <button class="nav-btn active" data-view="feed">
          <span class="nav-label">GlitchFeed</span>
        </button>
        <button class="nav-btn" data-view="missions">
          <span class="nav-label">Questy</span>
        </button>
      </div>
    </nav>

  </div>

  <!-- GLITCH DETAIL (overlay in content area) -->
  <div id="detail-overlay" class="overlay hidden">
    <div id="chat-container" class="chat-container"></div>
  </div>

  <!-- ACCOUNT OVERLAY -->
  <div id="account-overlay" class="account-overlay hidden">
    <div class="account-wrap">

      <button class="account-close-btn" id="account-close">✕</button>

      <div class="account-field">
        <div class="account-label">Tvá přezdívka</div>
        <div class="account-value account-editable" id="account-nickname-val" data-field="nickname" data-placeholder="Nevyplněno"></div>
        <input type="text" id="account-nickname-input" class="account-input hidden" placeholder="Tvoje přezdívka" maxlength="30" autocomplete="off">
      </div>

      <div class="account-field">
        <div class="account-label">Tvé jméno a příjmení</div>
        <div class="account-value account-editable" id="account-fullname-val" data-field="fullName" data-placeholder="Nevyplněno"></div>
        <input type="text" id="account-fullname-input" class="account-input hidden" placeholder="Jméno a příjmení" autocomplete="name">
      </div>

      <div class="account-field">
        <div class="account-label">Tvůj e-mail</div>
        <div class="account-value account-editable" id="account-email-val" data-field="email" data-placeholder="Nevyplněno"></div>
        <input type="email" id="account-email-input" class="account-input hidden" placeholder="e-mail" autocomplete="email">
      </div>

      <div class="account-field">
        <div class="account-label">Gender</div>
        <div class="account-radio-row" id="account-gender">
          <button class="account-radio-opt" data-group="gender" data-val="holka"><span class="account-dot"></span><span>Holka</span></button>
          <button class="account-radio-opt" data-group="gender" data-val="kluk"><span class="account-dot"></span><span>Kluk</span></button>
          <button class="account-radio-opt" data-group="gender" data-val="jine"><span class="account-dot"></span><span>Vlastní</span></button>
        </div>
      </div>

      <div class="account-field">
        <div class="account-label">Jak se chceš učit</div>
        <div class="account-radio-col" id="account-learning">
          <button class="account-radio-opt" data-group="learning" data-val="explorer"><span class="account-dot"></span><span>Baví mě zkoumat hodně věcí</span></button>
          <button class="account-radio-opt" data-group="learning" data-val="creator"><span class="account-dot"></span><span>Učím se tak, že tvořím</span></button>
          <button class="account-radio-opt" data-group="learning" data-val="depth"><span class="account-dot"></span><span>Zkoumám raději jednu věc pořádně</span></button>
        </div>
      </div>

      <div class="account-field">
        <div class="account-label">Tvůj postup</div>
        <button class="account-reset-btn" id="account-reset">Chci resetovat všechny své odpovědi.</button>
      </div>

      <button class="btn-primary account-logout-btn" id="account-logout">Odhlásit se</button>

    </div>
  </div>

  <script src="js/data.js?v=51"></script>
  <script src="js/app.js?v=51"></script>
</body>
</html>
