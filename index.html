<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#13101f">
  <title>Tiny Glitch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Nunito:wght@400;700;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- SPLASH -->
  <div id="splash" class="screen">
    <div class="splash-inner">
      <img src="assets/TinyGlitch.png" alt="Tiny Glitch" class="splash-logo-img">
<p class="splash-sub">Tvoje platforma<br>pro microlearning</p>
      <button id="splash-enter" class="btn-primary">Vstoupit</button>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="screen hidden">

    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-logo"><img src="assets/TinyGlitch-wide.png" alt="Tiny Glitch"></div>
      <button class="topbar-profile" id="profile-btn" aria-label="Profil"></button>
    </header>

    <!-- Views -->
    <main class="main-content">

      <!-- FEED -->
      <section id="view-feed" class="view active">
        <div id="feed-container"></div>
      </section>

      <!-- MAP -->
      <section id="view-map" class="view hidden">
        <div class="map-search-wrap">
          <input type="search" id="map-search" placeholder="🔍  Hledat glitch..." autocomplete="off">
        </div>
        <div id="map-container"></div>
      </section>

      <!-- MISSIONS -->
      <section id="view-missions" class="view hidden">
        <div id="category-carousel"></div>
        <div id="missions-container"></div>
      </section>

    </main>

    <!-- Bottom nav -->
    <nav class="bottom-nav">
      <div class="nav-spotlight"></div>
      <button class="nav-btn active" data-view="feed">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9z"/></svg>
        <span class="nav-label">Feed</span>
      </button>
      <button class="nav-btn" data-view="map">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
        <span class="nav-label">Mapa</span>
      </button>
      <button class="nav-btn" data-view="missions">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span class="nav-label">Mise</span>
      </button>
    </nav>

  </div>

  <!-- GLITCH DETAIL (full-screen overlay) -->
  <div id="detail-overlay" class="overlay hidden">
    <header class="detail-header">
      <button id="detail-back" class="btn-back" aria-label="Zpět">←</button>
      <h1 id="detail-title" class="detail-title"></h1>
    </header>
    <div id="chat-container" class="chat-container"></div>
  </div>

  <!-- LOGIN MODAL -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <h3>Jak ti říkají?</h3>
      <p>Zadej přezdívku a sleduj svůj pokrok.</p>
      <input type="text" id="username-input" placeholder="Tvoje přezdívka" maxlength="20" autocomplete="off">
      <button id="login-submit" class="btn-primary">Jdeme na to!</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
