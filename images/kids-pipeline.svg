<svg xmlns="http://www.w3.org/2000/svg" width="680" height="250" viewBox="0 0 680 250">
  <style>text { font-family: system-ui, sans-serif; }</style>

  <!-- Title -->
  <text x="340" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#7C3AED">Továrna na doporučení</text>

  <!-- Conveyor belt -->
  <rect x="30" y="175" width="620" height="12" rx="6" fill="#D1D5DB"/>
  <!-- Belt segments -->
  <line x1="60" y1="181" x2="80" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="110" y1="181" x2="130" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="160" y1="181" x2="180" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="210" y1="181" x2="230" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="260" y1="181" x2="280" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="310" y1="181" x2="330" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="360" y1="181" x2="380" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="410" y1="181" x2="430" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="460" y1="181" x2="480" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="510" y1="181" x2="530" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="560" y1="181" x2="580" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <line x1="610" y1="181" x2="630" y2="181" stroke="#9CA3AF" stroke-width="2"/>
  <!-- Wheels -->
  <circle cx="45" cy="192" r="8" fill="#9CA3AF"/>
  <circle cx="45" cy="192" r="3" fill="#6B7280"/>
  <circle cx="635" cy="192" r="8" fill="#9CA3AF"/>
  <circle cx="635" cy="192" r="3" fill="#6B7280"/>

  <!-- STAGE 1: FIND (Funnel) - Blue -->
  <g transform="translate(30, 35)">
    <!-- Funnel shape -->
    <path d="M0,0 L130,0 L130,20 L90,90 L90,140 L40,140 L40,90 L0,20 Z" fill="#3B82F6" rx="8"/>
    <path d="M5,5 L125,5 L125,18 L87,85 L87,135 L43,135 L43,85 L5,18 Z" fill="#2563EB"/>
    <!-- Items going in (dots at top) -->
    <circle cx="20" cy="12" r="3" fill="#BFDBFE"/>
    <circle cx="30" cy="8" r="2.5" fill="#BFDBFE"/>
    <circle cx="42" cy="12" r="3" fill="#BFDBFE"/>
    <circle cx="55" cy="9" r="2" fill="#BFDBFE"/>
    <circle cx="65" cy="12" r="2.5" fill="#BFDBFE"/>
    <circle cx="78" cy="8" r="3" fill="#BFDBFE"/>
    <circle cx="90" cy="12" r="2" fill="#BFDBFE"/>
    <circle cx="100" cy="9" r="2.5" fill="#BFDBFE"/>
    <circle cx="112" cy="12" r="3" fill="#BFDBFE"/>
    <text x="65" y="55" text-anchor="middle" font-size="14" font-weight="bold" fill="white">NAJDI</text>
    <!-- Millions label -->
    <text x="65" y="-8" text-anchor="middle" font-size="9" fill="#3B82F6" font-weight="bold">Miliony dovnitř!</text>
    <text x="65" y="122" text-anchor="middle" font-size="8" fill="#BFDBFE" font-weight="bold">500 ven</text>
  </g>

  <!-- Between 1→2 -->
  <g transform="translate(170, 115)">
    <!-- Small items on belt -->
    <circle cx="20" cy="50" r="4" fill="#3B82F6"/>
    <circle cx="30" cy="50" r="4" fill="#3B82F6"/>
    <circle cx="40" cy="50" r="4" fill="#3B82F6"/>
  </g>

  <!-- STAGE 2: RANK (Sorting machine) - Green -->
  <g transform="translate(225, 45)">
    <rect x="0" y="0" width="140" height="125" rx="12" fill="#10B981"/>
    <rect x="5" y="5" width="130" height="115" rx="10" fill="#059669"/>
    <!-- Gears -->
    <circle cx="35" cy="30" r="14" fill="none" stroke="#D1FAE5" stroke-width="2"/>
    <circle cx="35" cy="30" r="5" fill="#D1FAE5"/>
    <circle cx="100" cy="30" r="11" fill="none" stroke="#D1FAE5" stroke-width="2"/>
    <circle cx="100" cy="30" r="4" fill="#D1FAE5"/>
    <text x="70" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="white">SEŘAĎ</text>
    <text x="70" y="82" text-anchor="middle" font-size="8" fill="#D1FAE5">Bodujeme je...</text>
    <!-- Scores -->
    <text x="25" y="102" font-size="8" fill="white" font-weight="bold">#1 &#11088;</text>
    <text x="55" y="102" font-size="8" fill="white" font-weight="bold">#2 &#11088;</text>
    <text x="85" y="102" font-size="8" fill="white" font-weight="bold">#3</text>
    <text x="108" y="102" font-size="8" fill="#6EE7B7">...</text>
    <text x="70" y="116" text-anchor="middle" font-size="8" fill="#D1FAE5" font-weight="bold">500 &#10140; 10</text>
  </g>

  <!-- Between 2→3 -->
  <g transform="translate(375, 115)">
    <circle cx="20" cy="50" r="4" fill="#10B981"/>
    <circle cx="32" cy="50" r="4" fill="#10B981"/>
  </g>

  <!-- STAGE 3: CHECK (Quality check) - Purple -->
  <g transform="translate(430, 50)">
    <rect x="0" y="0" width="130" height="120" rx="12" fill="#7C3AED"/>
    <rect x="5" y="5" width="120" height="110" rx="10" fill="#6D28D9"/>
    <!-- Checkmark badge -->
    <circle cx="65" cy="35" r="16" fill="#A78BFA"/>
    <path d="M55 35 L62 42 L76 28" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="65" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="white">ZKONTROLUJ</text>
    <text x="65" y="84" text-anchor="middle" font-size="8" fill="#DDD6FE">Kontrola kvality!</text>
    <text x="65" y="108" text-anchor="middle" font-size="8" fill="#DDD6FE" font-weight="bold">10 &#10140; Dokonalý seznam!</text>
  </g>

  <!-- Final output: polished items -->
  <g transform="translate(575, 80)">
    <rect x="0" y="0" width="80" height="85" rx="10" fill="#FBBF24"/>
    <text x="40" y="20" text-anchor="middle" font-size="8" fill="#78350F" font-weight="bold">TVÉ NEJLEPŠÍ</text>
    <text x="40" y="34" text-anchor="middle" font-size="8" fill="#78350F" font-weight="bold">TIPY!</text>
    <rect x="10" y="40" width="60" height="12" rx="4" fill="#FDE68A"/>
    <text x="40" y="49" text-anchor="middle" font-size="7" fill="#92400E">1. Skvělé &#11088;</text>
    <rect x="10" y="55" width="60" height="12" rx="4" fill="#FDE68A"/>
    <text x="40" y="64" text-anchor="middle" font-size="7" fill="#92400E">2. Super &#11088;</text>
    <rect x="10" y="70" width="60" height="12" rx="4" fill="#FDE68A"/>
    <text x="40" y="79" text-anchor="middle" font-size="7" fill="#92400E">3. Paráda &#11088;</text>
  </g>

  <!-- Timer -->
  <rect x="260" y="200" width="160" height="28" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
  <text x="340" y="219" text-anchor="middle" font-size="12" font-weight="bold" fill="#F59E0B">&#9201; Vše za &lt; 1 sekundu!</text>

  <!-- Smoke/steam from factory -->
  <circle cx="295" cy="40" r="6" fill="#E5E7EB" opacity="0.5"/>
  <circle cx="305" cy="34" r="5" fill="#E5E7EB" opacity="0.4"/>
  <circle cx="300" cy="28" r="4" fill="#E5E7EB" opacity="0.3"/>
</svg>